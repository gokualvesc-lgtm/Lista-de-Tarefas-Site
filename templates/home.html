<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Home</title>
	<style>
		body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;margin:0}
		.container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
		.buttons{display:flex;gap:12px;margin-top:16px}
		.btn{padding:12px 24px;border-radius:6px;border:none;cursor:pointer;font-size:16px}
		.login{background:#007bff;color:#fff}
		.register{background:#28a745;color:#fff}
	</style>
</head>
<body>
	<div class="container">
		<h1>Bem-vindo</h1>
		<div class="buttons">
			<a href="/login"><button class="btn login">Login</button></a>
			<a href="/register"><button class="btn register">Register</button></a>
		</div>
	</div>
</body>
</html>
